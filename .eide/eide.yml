version: "4.1"
name: Agent_CCID_Reader
type: ARM
deviceName: STM32F103VE
packDir: null
srcDirs:
  - Core/Src
  - Core/Startup
  - USB_DEVICE/App
  - USB_DEVICE/Target
  - Drivers/STM32F1xx_HAL_Driver/Src
  - Middlewares/ST/STM32_USB_Device_Library/Core/Src
  - Middlewares/ST/STM32_USB_Device_Library/Class/CustomHID/Src
  - segger_rtt
  - NFC/LL
  - NFC/HL
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: c691ce91b60a43a9b328dbc7735e30b2
targets:
  Agent_CCID_Reader:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F103xE
      incList:
        - Core/Inc
        - USB_DEVICE/App
        - USB_DEVICE/Target
        - Drivers/STM32F1xx_HAL_Driver/Inc
        - Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
        - Middlewares/ST/STM32_USB_Device_Library/Core/Inc
        - Middlewares/ST/STM32_USB_Device_Library/Class/CustomHID/Inc
        - Drivers/CMSIS/Device/ST/STM32F1xx/Include
        - Drivers/CMSIS/Include
        - segger_rtt
        - NFC/LL
        - NFC/HL
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: soft
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: stm32f103xe.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32F103VE
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
